services:
  backend:
    build:
      context: .
      dockerfile: backend/app/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release

  frontend:
    build:
      context: ./frontend/traffic-ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
